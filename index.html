<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif; background:linear-gradient(to right, #4facfe, #00f2fe); height:100vh; display:flex; justify-content:center; align-items:center;">

    <div style="background:white; padding:40px; border-radius:12px; width:320px; box-shadow:0 4px 15px rgba(0,0,0,0.2);">
        
        <h2 style="text-align:center; margin-bottom:25px; color:#333;">Login</h2>

        <form>
            <input 
                type="text" 
                placeholder="Username"
                style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:6px; font-size:16px; box-sizing:border-box;"
            />

            <input 
                type="password" 
                placeholder="Password"
                style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:6px; font-size:16px; box-sizing:border-box;"
            />

            <button 
                type="submit"
                style="width:100%; padding:12px; background:#4facfe; border:none; border-radius:6px; color:white; font-size:16px; cursor:pointer;"
            >
                Login
            </button>
        </form>

        <p style="text-align:center; margin-top:15px; color:#666; font-size:14px;">
            Don't have an account? Sign up
        </p>

    </div>

</body>
</html>
