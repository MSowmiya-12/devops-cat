<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to right, #4facfe, #00f2fe);
    }

    .container{
      background:white;
      padding:30px;
      border-radius:15px;
      width:350px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h1{
      margin-bottom:20px;
      color:#333;
    }

    input{
      width:100%;
      padding:12px;
      margin:15px 0;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#4facfe;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0077ff;
    }

    #result{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      color:#222;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Age Calculator</h1>

    <input type="date" id="dob">

    <button onclick="calculateAge()">Calculate Age</button>

    <div id="result"></div>
  </div>

  <script>
    function calculateAge(){
      let dob = document.getElementById('dob').value;

      if(dob === ''){
        document.getElementById('result').innerHTML = 'Please select your birth date';
        return;
      }

      let birthDate = new Date(dob);
      let today = new Date();

      let age = today.getFullYear() - birthDate.getFullYear();

      let month = today.getMonth() - birthDate.getMonth();

      if(month < 0 || (month === 0 && today.getDate() < birthDate.getDate())){
        age--;
      }

      document.getElementById('result').innerHTML = 'Your Age is ' + age + ' years';
    }
  </script>

</body>
</html>
