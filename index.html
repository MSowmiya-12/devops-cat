<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #ff9966, #ff5e62);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      background:white;
      width:350px;
      padding:25px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-box{
      display:flex;
      gap:10px;
    }

    input{
      flex:1;
      padding:10px;
      border:2px solid #ddd;
      border-radius:8px;
      outline:none;
    }

    button{
      padding:10px 15px;
      border:none;
      background:#4facfe;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#2196f3;
    }

    ul{
      margin-top:20px;
      list-style:none;
    }

    li{
      background:#f4f4f4;
      padding:10px;
      margin-bottom:10px;
      border-radius:8px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .delete{
      background:red;
      padding:5px 10px;
      border-radius:5px;
      color:white;
      cursor:pointer;
      border:none;
    }

    .delete:hover{
      background:darkred;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📝 To-Do List</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter task">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    function addTask() {
      let input = document.getElementById("taskInput");
      let task = input.value;

      if(task === ""){
        alert("Please enter a task!");
        return;
      }

      let li = document.createElement("li");
      li.innerHTML = `
        ${task}
        <button class="delete" onclick="removeTask(this)">X</button>
      `;

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }

    function removeTask(button){
      button.parentElement.remove();
    }
  </script>

</body>
</html>
