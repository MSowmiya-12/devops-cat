<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#333;
    }

    header{
      background:#0077ff;
      color:white;
      padding:20px;
      text-align:center;
    }

    nav{
      background:#0056b3;
      padding:10px;
      text-align:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-weight:bold;
    }

    .hero{
      height:300px;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:linear-gradient(to right, #0077ff, #00c6ff);
      color:white;
      text-align:center;
    }

    .hero h1{
      font-size:40px;
      margin-bottom:10px;
    }

    .hero p{
      font-size:18px;
      margin-bottom:20px;
    }

    .btn{
      padding:10px 20px;
      background:white;
      color:#0077ff;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    .content{
      padding:40px;
      text-align:center;
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Website</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <h1>Welcome!</h1>
    <p>This is a simple HTML and CSS website.</p>
    <button class="btn">Get Started</button>
  </section>

  <section class="content">
    <h2>About This Website</h2>
    <p>
      This webpage is created using only HTML and CSS.
      It is beginner-friendly and easy to customize.
    </p>
  </section>

  <footer>
    <p>© 2026 My Website | All Rights Reserved</p>
  </footer>

</body>
</html>
